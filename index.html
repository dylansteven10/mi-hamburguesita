<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Hamburguesita</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🍔 Mi Hamburguesita</h1>
  <p>Las mejores hamburguesas artesanales con ingredientes frescos y sabor único.</p>
</header>

<main class="grid">

  <figure>
    <img src="https://images.pexels.com/photos/1639557/pexels-photo-1639557.jpeg" alt="Hamburguesa clásica con queso y vegetales frescos">
    <figcaption>Hamburguesa clásica con carne jugosa, queso cheddar y vegetales frescos.</figcaption>
  </figure>

  <figure>
    <img src="https://images.pexels.com/photos/3219483/pexels-photo-3219483.jpeg" alt="Hamburguesa BBQ con tocineta crujiente">
    <figcaption>Deliciosa hamburguesa BBQ con salsa ahumada y tocineta crocante.</figcaption>
  </figure>

  <figure>
    <img src="https://images.pexels.com/photos/1279330/pexels-photo-1279330.jpeg" alt="Hamburguesa gourmet con ingredientes premium">

  </figure>

  <figure>
    <img src="https://images.pexels.com/photos/70497/pexels-photo-70497.jpeg" alt="Papas fritas crujientes estilo casero">
    <figcaption>Papas fritas crujientes acompañadas de salsas especiales.</figcaption>
  </figure>

  <figure>
    <img src="https://images.pexels.com/photos/461198/pexels-photo-461198.jpeg" alt="Milkshake de chocolate artesanal">
